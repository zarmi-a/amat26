<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סימולטור מרוצי סוסים - נדב, איתמר ויאיר</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Courier+Prime:wght@400;700&display=swap');

:root {
  --sepia-bg: #f4ecd8;
  --sepia-dark: #433422;
  --sepia-accent: #8c7851;
  --grass-green: #2d5a27;
}

body {
  font-family: 'Assistant', sans-serif;
  background-color: #e8dfc8;
  background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  color: var(--sepia-dark);
}

.vintage-font {
  font-family: 'Courier Prime', monospace;
}

.old-film-effect::after {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.1;
  pointer-events: none;
  z-index: 20;
}

.race-track {
  background-color: var(--grass-green);
  background-image: url("https://www.transparenttextures.com/patterns/p6-dark.png");
  border-top: 8px double #1a3317;
  border-bottom: 8px double #1a3317;
  position: relative;
  height: 320px;
  overflow: hidden;
  border-radius: 0.25rem;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
}

.lane {
  height: 25%;
  border-bottom: 1px dashed rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  position: relative;
}

.lane-number {
  position: absolute;
  right: 80px;
  font-family: 'Courier Prime', monospace;
  font-weight: bold;
  font-size: 3rem;
  color: rgba(255,255,255,0.2);
  pointer-events: none;
  user-select: none;
}

.horse {
  font-size: 2.8rem;
  position: absolute;
  left: 0;
  transition: left 0.15s linear;
  z-index: 10;
  filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
}

.finish-line {
  position: absolute;
  right: 40px;
  top: 0;
  bottom: 0;
  width: 20px;
  background: repeating-linear-gradient(
    0deg,
    #111,
    #111 10px,
    #eee 10px,
    #eee 20px
  );
  border-left: 3px solid #000;
  z-index: 5;
}

.stats-card {
  background: #fdfaf0;
  border: 2px solid var(--sepia-accent);
  border-radius: 0;
  box-shadow: 5px 5px 0px var(--sepia-accent);
}

.vintage-input {
  accent-color: var(--sepia-dark);
}

@keyframes gallop {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50% { transform: translateY(-4px) rotate(2deg); }
}

.running {
  animation: gallop 0.4s infinite;
}

.btn-retro {
  background-color: var(--sepia-dark);
  color: #f4ecd8;
  border: 1px solid #000;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-retro:hover {
  background-color: #5a462e;
}

.btn-retro:disabled {
  background-color: #a09586;
}

.guess-btn {
  border: 1px solid var(--sepia-accent);
  background: #fff;
  filter: sepia(0.2);
}

.guess-btn.selected {
  background-color: var(--sepia-accent);
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 0 var(--sepia-dark);
}
</style>
</head>
<body class="p-4 md:p-8">

<header class="text-center mb-8">
  <h1 class="text-5xl font-black vintage-font text-gray-800 mb-2 border-b-4 border-double border-gray-800 inline-block px-4">מירוץ הסוסים הגדול</h1>
  <p class="text-xl vintage-font text-gray-700 mt-2">מהדורת חורף 1934 | חוקרים: נדב, איתמר ויאיר</p>
</header>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-8 max-w-7xl mx-auto">

  <div class="lg:col-span-1 stats-card p-6 space-y-6">
    <h2 class="text-2xl font-bold vintage-font border-b-2 border-gray-300 pb-2 flex items-center">
      <i class="fas fa-scroll ml-2"></i> נתוני המרוץ
    </h2>

    <div id="controlsContainer" class="space-y-4">
      <!-- ייווצר ע"י JS -->
    </div>

    <div class="pt-4 border-t-2 border-gray-300">
      <h3 class="font-bold vintage-font mb-3 text-center">הימור על המנצח</h3>
      <div class="grid grid-cols-4 gap-2 mb-4" id="guessContainer">
        <!-- כפתורי ניחוש ייווצרו ע"י JS -->
      </div>

      <div id="confidenceContainer" class="hidden animate-fade-in bg-yellow-50 p-3 border border-yellow-200">
        <div class="flex justify-between text-xs mb-1 font-bold vintage-font">
          <span>רמת ביטחון:</span>
          <span id="confidenceVal">50%</span>
        </div>
        <input type="range" id="confidenceIn" min="1" max="100" step="1" value="50"
          class="w-full h-2 vintage-input appearance-none bg-gray-300 rounded cursor-pointer">
      </div>
    </div>

    <button id="raceBtn" class="w-full btn-retro font-bold py-4 rounded-none shadow-lg transition-all disabled:opacity-50 vintage-font text-xl">
      הזנק מרוץ! <i class="fas fa-flag-checkered ml-2"></i>
    </button>
    <p id="guessPrompt" class="text-xs text-red-700 text-center mt-2 font-vintage">יש לבחור סוס לפני ההזנקה</p>
  </div>

  <div class="lg:col-span-3 space-y-6">

    <div class="stats-card overflow-hidden p-3 old-film-effect relative bg-white">
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 opacity-10">
        <span class="vintage-font text-7xl font-bold text-white uppercase transform rotate-[-15deg]">Royal Turf Club</span>
      </div>

      <div class="race-track" id="track">
        <div class="finish-line"></div>

        <div class="lane">
          <div id="horseA" class="horse">🐎</div>
          <span class="lane-number">1</span>
        </div>
        <div class="lane">
          <div id="horseB" class="horse">🐎</div>
          <span class="lane-number">2</span>
        </div>
        <div class="lane">
          <div id="horseC" class="horse">🐎</div>
          <span class="lane-number">3</span>
        </div>
        <div class="lane">
          <div id="horseD" class="horse">🐎</div>
          <span class="lane-number">4</span>
        </div>
      </div>
    </div>

    <div id="resultBox" class="hidden stats-card p-10 text-center border-4 border-double">
      <h3 id="winnerTitle" class="text-5xl font-black vintage-font mb-4"></h3>
      <p id="guessResult" class="text-2xl vintage-font"></p>
      <p id="confidenceSummary" class="text-gray-600 mt-2 vintage-font"></p>
      <button onclick="resetRace()" class="mt-8 btn-retro px-6 py-2 vintage-font">מרוץ חדש</button>
    </div>

  </div>
</div>

<script>
const horses = [
  { id: 'A', name: "סוס מס' 1", mean: 20, sd: 1, pos: 0 },
  { id: 'B', name: "סוס מס' 2", mean: 20, sd: 5, pos: 0 },
  { id: 'C', name: "סוס מס' 3", mean: 18, sd: 2, pos: 0 },
  { id: 'D', name: "סוס מס' 4", mean: 22, sd: 0.5, pos: 0 },
];

let isRacing = false;
let selectedGuess = null;
let confidenceLevel = 50;

function initUI() {
  const controls = document.getElementById('controlsContainer');
  const guessContainer = document.getElementById('guessContainer');
  controls.innerHTML = '';
  guessContainer.innerHTML = '';

  horses.forEach((h, index) => {
    const controlDiv = document.createElement('div');
    controlDiv.className = `p-4 bg-white border border-gray-300`;
    controlDiv.innerHTML = `
      <h3 class="font-bold vintage-font text-gray-800 mb-2">${h.name}</h3>
      <div class="space-y-3">
        <div>
          <div class="flex justify-between text-[10px] mb-1 vintage-font uppercase">
            <span>מהירות ממוצעת</span>
            <span id="meanVal${h.id}">${h.mean}</span>
          </div>
          <input type="range" id="meanIn${h.id}" min="10" max="30" step="0.5" value="${h.mean}"
            class="w-full h-1 bg-gray-300 rounded appearance-none cursor-pointer vintage-input">
        </div>
        <div>
          <div class="flex justify-between text-[10px] mb-1 vintage-font uppercase">
            <span>עקביות (SD)</span>
            <span id="sdVal${h.id}">${h.sd}</span>
          </div>
          <input type="range" id="sdIn${h.id}" min="0" max="10" step="0.5" value="${h.sd}"
            class="w-full h-1 bg-gray-300 rounded appearance-none cursor-pointer vintage-input">
        </div>
      </div>
    `;
    controls.appendChild(controlDiv);

    const btn = document.createElement('button');
    btn.id = `btnGuess${h.id}`;
    btn.className = `guess-btn p-3 vintage-font font-bold text-xl`;
    btn.innerHTML = (index + 1).toString();
    btn.onclick = () => selectGuess(h.id);
    guessContainer.appendChild(btn);

    document.getElementById(`meanIn${h.id}`).oninput = (e) => {
      h.mean = parseFloat(e.target.value);
      document.getElementById(`meanVal${h.id}`).textContent = h.mean;
    };

    document.getElementById(`sdIn${h.id}`).oninput = (e) => {
      h.sd = parseFloat(e.target.value);
      document.getElementById(`sdVal${h.id}`).textContent = h.sd;
    };
  });

  document.getElementById('confidenceIn').oninput = (e) => {
    confidenceLevel = e.target.value;
    document.getElementById('confidenceVal').textContent = confidenceLevel + '%';
  };

  updateRaceBtnState();
}

function selectGuess(id) {
  if (isRacing) return;
  selectedGuess = id;

  horses.forEach(h => document.getElementById(`btnGuess${h.id}`).classList.remove('selected'));
  document.getElementById(`btnGuess${id}`).classList.add('selected');

  horses.forEach(h => {
    const horseEl = document.getElementById(`horse${h.id}`);
    if (h.id === id) {
      horseEl.innerHTML = '🏇'; // סוס עם רוכב
    } else {
      horseEl.innerHTML = '🐎'; // סוס רגיל
    }
  });

  document.getElementById('confidenceContainer').classList.remove('hidden');
  updateRaceBtnState();
}

function updateRaceBtnState() {
  const btn = document.getElementById('raceBtn');
  const prompt = document.getElementById('guessPrompt');
  if (selectedGuess) {
    btn.disabled = false;
    prompt.classList.add('hidden');
  } else {
    btn.disabled = true;
    prompt.classList.remove('hidden');
  }
}

function randomNormal(mean, sd) {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return (Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v)) * sd + mean;
}

function runRace() {
  if (isRacing || !selectedGuess) return;
  isRacing = true;
  resetRaceLayout();

  document.getElementById('resultBox').classList.add('hidden');
  document.getElementById('raceBtn').disabled = true;

  horses.forEach(h => document.getElementById(`horse${h.id}`).classList.add('running'));

  const trackWidth = document.getElementById('track').offsetWidth - 100;

  const raceInterval = setInterval(() => {
    let someoneFinished = false;
    let leaderId = null;

    horses.forEach(h => {
      const targetSpeed = 80 / h.mean;
      const noise = randomNormal(0, h.sd * 0.8);
      const instantSpeed = Math.max(0.1, targetSpeed + noise);

      h.pos += (instantSpeed / 5);
      document.getElementById(`horse${h.id}`).style.left = h.pos + 'px';

      if (h.pos >= trackWidth && !someoneFinished) {
        someoneFinished = true;
        leaderId = h.id;
      }
    });

    if (someoneFinished) {
      clearInterval(raceInterval);
      finishRace(leaderId);
    }
  }, 50);
}

function finishRace(winnerId) {
  isRacing = false;
  const winner = horses.find(h => h.id === winnerId);
  const winnerIndex = horses.indexOf(winner) + 1;

  horses.forEach(h => document.getElementById(`horse${h.id}`).classList.remove('running'));

  const resultBox = document.getElementById('resultBox');
  resultBox.classList.remove('hidden');
  document.getElementById('winnerTitle').textContent = `המנצח: סוס מס' ${winnerIndex}`;

  const guessResultEl = document.getElementById('guessResult');
  const confidenceSummaryEl = document.getElementById('confidenceSummary');

  if (winnerId === selectedGuess) {
    guessResultEl.textContent = "ניצחון מזהיר! הניחוש התברר כנכון.";
    guessResultEl.style.color = "#2d5a27";
    launchConfetti();
  } else {
    guessResultEl.textContent = "לצערנו, הסוס עליו הימרת הגיע מאוחר.";
    guessResultEl.style.color = "#7a2b2b";
  }

  confidenceSummaryEl.textContent = `נרשם ביטחון של ${confidenceLevel}% בתוצאה זו.`;
}

function launchConfetti() {
  confetti({
    particleCount: 150,
    spread: 70,
    origin: { y: 0.6 },
    colors: ['#433422', '#8c7851', '#e8dfc8', '#2d5a27']
  });
}

function resetRaceLayout() {
  horses.forEach(h => {
    h.pos = 0;
    document.getElementById(`horse${h.id}`).style.left = '0px';
  });
}

function resetRace() {
  resetRaceLayout();
  document.getElementById('resultBox').classList.add('hidden');
  selectedGuess = null;
  horses.forEach(h => {
    document.getElementById(`btnGuess${h.id}`).classList.remove('selected');
    document.getElementById(`horse${h.id}`).innerHTML = '🐎'; // איפוס לסוס רגיל לכולם
  });
  document.getElementById('confidenceContainer').classList.add('hidden');
  updateRaceBtnState();
}

window.onload = initUI;
document.getElementById('raceBtn').onclick = runRace;
</script>
</body>
</html>
