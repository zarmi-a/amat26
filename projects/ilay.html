
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכונת זמן פיננסית - גרסת המחקר המשודרגת</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .card { background: white; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .highlight-box { background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); border: 1px solid #bfdbfe; }
        input[type="range"] { accent-color: #2563eb; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header & Top Insight -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-blue-900 mb-2">מכונת זמן פיננסית</h1>
            <div id="dynamicInsight" class="inline-block mt-2 px-4 py-2 bg-blue-900 text-white rounded-full text-sm font-bold shadow-lg">
                טוען תובנות מחקר...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Controls (4 cols) -->
            <div class="lg:col-span-4 space-y-4">
                <div class="card">
                    <h2 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <span>⚙️</span> פרמטרים של הסדרה
                    </h2>
                    
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-600 mb-2">יעד כספי: <span id="targetVal" class="font-bold text-blue-600"></span></label>
                        <input type="range" id="targetSlider" min="100000" max="2000000" step="50000" value="1000000" class="w-full">
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-600 mb-2">גיל תחילת חיסכון: <span id="ageVal" class="font-bold text-blue-600"></span></label>
                        <input type="range" id="ageSlider" min="10" max="60" step="1" value="25" class="w-full">
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-600 mb-2">תשואה שנתית (%): <span id="yieldVal" class="font-bold text-blue-600"></span></label>
                        <input type="range" id="yieldSlider" min="1" max="15" step="0.5" value="8" class="w-full">
                    </div>

                    <div class="space-y-3 pt-2 border-t">
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-sm font-bold text-gray-700">מצב השוואה (גיל 15)</span>
                            <input type="checkbox" id="compareToggle" class="sr-only peer">
                            <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:bg-green-500 after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:-translate-x-5"></div>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-sm font-bold text-gray-700">הצג ערך ריאלי (אינפלציה)</span>
                            <input type="checkbox" id="inflationToggle" class="sr-only peer">
                            <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:bg-red-500 after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:-translate-x-5"></div>
                        </label>
                    </div>
                </div>

                <div class="card highlight-box">
                    <h3 class="font-bold text-blue-800 text-sm mb-2">💡 חוק ה-72</h3>
                    <p id="rule72Text" class="text-sm text-blue-900"></p>
                </div>
            </div>

            <!-- Dashboard (8 cols) -->
            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="card text-center border-b-4 border-blue-500">
                        <p class="text-xs text-gray-500 font-bold uppercase">הפקדה חודשית</p>
                        <p id="statMonthly" class="text-xl font-bold text-blue-900">₪0</p>
                    </div>
                    <div class="card text-center border-b-4 border-purple-500">
                        <p class="text-xs text-gray-500 font-bold uppercase">נקודת המפנה</p>
                        <p id="statPivot" class="text-xl font-bold text-purple-900">גיל --</p>
                    </div>
                    <div class="card text-center border-b-4 border-green-500">
                        <p class="text-xs text-gray-500 font-bold uppercase">רווח מהריבית</p>
                        <p id="statProfit" class="text-xl font-bold text-green-700">₪0</p>
                    </div>
                </div>

                <div class="card h-[450px] relative">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mainChart;
        const ctx = document.getElementById('mainChart').getContext('2d');

        const sliders = ['targetSlider', 'ageSlider', 'yieldSlider'];
        const toggles = ['compareToggle', 'inflationToggle'];
        
        const fmt = (n) => new Intl.NumberFormat('he-IL', { style: 'currency', currency: 'ILS', maximumFractionDigits: 0 }).format(n);

        function update() {
            const target = parseFloat(document.getElementById('targetSlider').value);
            const age = parseInt(document.getElementById('ageSlider').value);
            const yieldRate = parseFloat(document.getElementById('yieldSlider').value) / 100;
            const compareMode = document.getElementById('compareToggle').checked;
            const showInflation = document.getElementById('inflationToggle').checked;
            
            document.getElementById('targetVal').innerText = fmt(target);
            document.getElementById('ageVal').innerText = age;
            document.getElementById('yieldVal').innerText = (yieldRate * 100) + '%';

            const years = 67 - age;
            const months = years * 12;
            const mRate = Math.pow(1 + yieldRate, 1/12) - 1;
            const monthlyDep = target / ((Math.pow(1 + mRate, months) - 1) / mRate);
            
            // Dynamic Insight
            const lossPerYear = (monthlyDep * 0.15); // Rough estimation for impact
            document.getElementById('dynamicInsight').innerText = `כל שנה של המתנה "עולה" לך עוד כ-${Math.round(lossPerYear)}₪ בהפקדה החודשית!`;
            
            // Rule of 72
            const dTime = (72 / (yieldRate * 100)).toFixed(1);
            document.getElementById('rule72Text').innerText = `בתשואה של ${yieldRate*100}%, הכסף שלך יכפיל את עצמו כל ${dTime} שנים.`;

            document.getElementById('statMonthly').innerText = fmt(monthlyDep);
            document.getElementById('statProfit').innerText = fmt(target - (monthlyDep * months));

            drawChart(age, yieldRate, monthlyDep, target, compareMode, showInflation);
        }

        function drawChart(startAge, yieldRate, deposit, target, compare, inflation) {
            const labels = [];
            const nominal = [];
            const invested = [];
            const comparison = [];
            const real = [];
            
            let pivotAge = null;
            let doublePoints = [];
            let nextDouble = deposit * 12; // Start small

            const mRate = Math.pow(1 + yieldRate, 1/12) - 1;
            const infRate = 0.022; // Average inflation
            
            // Comparison logic (fixed start age 15)
            const compYears = 67 - 15;
            const compMonths = compYears * 12;
            const compDep = target / ((Math.pow(1 + mRate, compMonths) - 1) / mRate);

            for (let age = 10; age <= 67; age++) {
                labels.push(age);
                
                // Main logic
                if (age >= startAge) {
                    const mElapsed = (age - startAge) * 12;
                    const val = deposit * ((Math.pow(1 + mRate, mElapsed) - 1) / mRate);
                    const inv = deposit * mElapsed;
                    nominal.push(val);
                    invested.push(inv);
                    
                    if (val > inv * 2 && !pivotAge) pivotAge = age;
                    
                    if (inflation) {
                        real.push(val / Math.pow(1 + infRate, age - startAge));
                    } else {
                        real.push(null);
                    }
                } else {
                    nominal.push(null);
                    invested.push(null);
                    real.push(null);
                }

                // Comparison logic
                if (compare && age >= 15) {
                    const mElapsed = (age - 15) * 12;
                    comparison.push(compDep * ((Math.pow(1 + mRate, mElapsed) - 1) / mRate));
                } else {
                    comparison.push(null);
                }
            }

            document.getElementById('statPivot').innerText = pivotAge ? `גיל ${pivotAge}` : "--";

            const data = {
                labels: labels,
                datasets: [
                    {
                        label: 'צמיחה נומינלית (הון)',
                        data: nominal,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    },
                    {
                        label: 'סך הפקדות (קרן)',
                        data: invested,
                        borderColor: '#94a3b8',
                        borderDash: [5, 5],
                        pointRadius: 0
                    }
                ]
            };

            if (compare) {
                data.datasets.push({
                    label: 'התחלה בגיל 15 (השוואה)',
                    data: comparison,
                    borderColor: '#22c55e',
                    borderDash: [2, 2],
                    pointRadius: 0
                });
            }

            if (inflation) {
                data.datasets.push({
                    label: 'ערך ריאלי (כוח קנייה)',
                    data: real,
                    borderColor: '#ef4444',
                    borderWidth: 1,
                    pointRadius: 0
                });
            }

            if (mainChart) mainChart.destroy();
            
            mainChart = new Chart(ctx, {
                type: 'line',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { rtl: true, labels: { font: { family: 'Assistant', weight: 'bold' } } },
                        tooltip: { mode: 'index', intersect: false, rtl: true }
                    },
                    scales: {
                        y: { ticks: { callback: (v) => '₪' + v.toLocaleString() } },
                        x: { title: { display: true, text: 'גיל' } }
                    }
                }
            });
        }

        [...sliders, ...toggles].forEach(id => document.getElementById(id).addEventListener('input', update));
        window.onload = update;
    </script>
</body>
</html>
